name: Update Investment Calendar

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:        # 버튼으로 수동 실행도 가능

permissions:
  contents: write           # 결과 파일을 저장소에 커밋할 권한

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install yfinance

      - name: 캘린더 생성
        run: python generate_calendar.py

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add calendar.ics
          git diff --staged --quiet || git commit -m "캘린더 자동 갱신 $(date +%F)"
          git push
